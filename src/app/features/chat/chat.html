<section class="chat-container">
    <div class="box messages-list" #scrollContainer>
        @for (msg of chatService.messages(); track $index) {
            <div class="message question-message ">
                <div class="message-content">
                {{ msg.question }}
                </div>
            </div>
             @if(msg.answer) {   
                <div class="message answer-message">
                    <div class="message-content">      
                            <div class="markdown-body" [innerHTML]="msg.answer | markdown"></div>
                    </div>
                </div>
            }@else {
                @if(!msg.isCompleted && chatService.isLoading()) {
                <div class="message answer-message">
                    <div class="message-content">  
                        <div class="answer-typing"><span></span></div>
                    </div>
                </div>
                }
            }
        }
    </div>
    <div class="box-footer">
        <div class="input-container">
            <input type="text" #search placeholder="Send message..." (keydown.enter)="getAnswer()" />
            <i class="fa-solid fa-paper-plane" (click)="getAnswer()"></i>
        </div>
    </div>
</section>
